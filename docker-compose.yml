# Hardened, read-only static hosting for justelesRCP.
# The generated site (./dist) and Caddyfile are mounted read-only; the container
# itself runs read-only with a tmpfs for Caddy's scratch space.
services:
  web:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      # host:container - front this with your existing TLS reverse proxy.
      - "${PORT:-8080}:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./dist:/srv:ro
    read_only: true
    tmpfs:
      # Caddy needs a writable data/config dir even without TLS.
      - /tmp
      - /config
      - /data
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/index.html"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
