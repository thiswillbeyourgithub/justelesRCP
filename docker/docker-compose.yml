# Hardened, read-only static hosting for justelesRCP.
# The generated site (../dist), the Caddyfile and the entrypoint are mounted
# read-only; the container itself runs read-only with tmpfs scratch space.
#
# Runtime config (privacy-friendly umami metrics + the optional DEV banner) comes
# from docker/.env; see docker/env.example for the keys. The entrypoint renders
# it into /gen/app-config.js at startup and Caddy serves that for /app-config.js.
services:
  web:
    image: caddy:2-alpine
    # Stable name so deploy.sh can `docker inspect justelesrcp` for health checks
    # (without it the container would be the project-derived `docker-web-1`).
    container_name: justelesrcp
    restart: unless-stopped
    # Startup wrapper (docker/entrypoint.sh): stamps STARTED_AT, validates
    # ANALYTICS_URL (crashes if set but unreachable / not JavaScript), derives
    # ANALYTICS_ORIGIN for the CSP, renders /gen/app-config.js from the env, then
    # exec's caddy. Run via /bin/sh so no host +x bit is required.
    entrypoint: ["/bin/sh", "/usr/local/bin/entrypoint.sh"]
    ports:
      # host:container - front this with your existing TLS reverse proxy, which
      # is already pointed at 8459.
      - "${PORT:-8459}:8459"
    # Analytics + dev-banner config, injected straight into the container from
    # docker/.env (gitignored; copy docker/env.example). Unset keys fall back to
    # safe defaults in the entrypoint / client code (DNT=true, DEV off, no
    # analytics). We deliberately do NOT add an `environment:` block: it would
    # take precedence over env_file and, since compose interpolates ${VAR} from
    # the CWD rather than docker/, shadow these with empty values.
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
      - ../dist:/srv:ro
    read_only: true
    tmpfs:
      # Caddy needs a writable data/config dir even without TLS; /gen holds the
      # per-startup rendered app-config.js (see entrypoint.sh + Caddyfile).
      - /tmp
      - /config
      - /data
      - /gen
    cap_drop:
      - ALL
    cap_add:
      # The caddy:2-alpine binary ships with `setcap cap_net_bind_service=+ep`.
      # The effective (+e) bit means execve() fails with EPERM ("Operation not
      # permitted") if this cap is not in the bounding set - which cap_drop: ALL
      # empties. We don't bind a privileged port (we listen on 8459), but the
      # binary's file cap must still be satisfiable at exec time, so add it back.
      # Everything else stays dropped; this is the one cap Caddy's binary needs.
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8459/index.html"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Companion refresh service (refresh-service.py): the ONE runtime piece, behind
  # the "Rafraichir maintenant" button and the >1-year auto-refresh. Caddy above
  # reverse-proxies /api/* to it (see Caddyfile), so it is never exposed to the
  # host directly (no ports:). Kept separate from `web` so the web server stays
  # fully read-only; this container gets only the narrow writable mounts it needs.
  refresh:
    build:
      context: ..
      dockerfile: docker/refresh.Dockerfile
      args:
        # Stamp the built image with the deploying commit so deploy.sh can verify
        # what is actually live on the VPS (see refresh.Dockerfile's git.sha
        # LABEL). deploy.sh exports GIT_SHA into the `docker compose up --build`
        # environment; a plain local build with no GIT_SHA set falls back to
        # "unknown". This is build-time only: it is NOT a runtime env var, so it
        # deliberately stays out of env_file / env.example.
        GIT_SHA: ${GIT_SHA:-unknown}
    container_name: justelesrcp-refresh
    restart: unless-stopped
    # Match the host user that owns ../data and ../dist so files the service
    # writes (overlays, rebuilt pages, the manifest) stay owned by you and sync
    # cleanly. Defaults to 1000:1000 (the usual first Linux user); override with
    # REFRESH_UID/REFRESH_GID in docker/.env if your host uid differs (e.g. VPS).
    user: "${REFRESH_UID:-1000}:${REFRESH_GID:-1000}"
    # Same env file as web. Tuning knobs (all optional, sane defaults in the
    # script): REFRESH_RATE_SECONDS (ANSM crawler lane, default 120),
    # REFRESH_DEMAND_RATE_SECONDS (on-demand button/auto lane, default 5),
    # REFRESH_MIN_INTERVAL_SECONDS, REFRESH_QUEUE_MAX, REFRESH_CRAWL (ANSM
    # crawler on/off) + REFRESH_CRAWL_TTL_DAYS; the EMA /eu/ crawler lane
    # REFRESH_EMA_CRAWL (on/off) + REFRESH_EMA_RATE_SECONDS (default 300, gentle)
    # + REFRESH_EMA_CRAWL_TTL_DAYS (default 180); RCP_OVERLAY_GZIP. See docker/env.example.
    env_file:
      - .env
    volumes:
      # Read-only: the CIS -> name map (for page titles) and the RCP template are
      # baked into the image, but names must be current, so mount the map RO.
      - ../data/CIS_bdpm.txt:/app/data/CIS_bdpm.txt:ro
      # Read-only: the composition + generic joins + frequency list, so a
      # refreshed page gets the SAME cross-drug backlinks a full build produces
      # (build_xref_index reads them). All optional; if a file is missing the
      # rebuilt page just has fewer/no backlinks. deploy.sh rsyncs them.
      - ../data/CIS_COMPO_bdpm.txt:/app/data/CIS_COMPO_bdpm.txt:ro
      - ../data/CIS_GENER_bdpm.txt:/app/data/CIS_GENER_bdpm.txt:ro
      - ../data/drugs_frequency.jsonl:/app/data/drugs_frequency.jsonl:ro
      # The ONLY writable locations (the "write just here" compromise): the
      # overlay dir, the rebuilt-page dir, and the scrape manifest file. The
      # manifest must exist on the host first (run scrape-rcp.py once, or
      # `touch data/.scrape-manifest.json`), else Docker would create a directory
      # in its place (IsADirectoryError at startup). deploy.sh heals this before
      # `up`; scrape.load_manifest also tolerates a directory/empty file, and
      # scrape.save_manifest writes in place here (a .tmp sibling would be EROFS
      # since /app/data is read-only apart from this single mounted file).
      - ../data/rcp:/app/data/rcp
      - ../data/.scrape-manifest.json:/app/data/.scrape-manifest.json
      - ../dist/rcp:/app/dist/rcp
      # Same three writable paths for the EMA /eu/ lane (button + crawler on a
      # centrally-authorized drug): its overlay dir, its rebuilt-page dir, and its
      # SEPARATE manifest. Like the RCP manifest, the EMA manifest must exist as a
      # file on the host before first `up` (else Docker makes a directory);
      # deploy.sh writes `{}` for it, and scrape.load/save_manifest tolerate a
      # directory / write in place on the read-only rootfs. The /eu/ overlay dir is
      # also where the crawler discovers which pages to refresh (_build_eu_order).
      - ../data/eu:/app/data/eu
      - ../data/.scrape-ema-manifest.json:/app/data/.scrape-ema-manifest.json
      - ../dist/eu:/app/dist/eu
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8460/api/health').status==200 else 1)"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Warm server-side embedder (embed-service.py): keeps ONE ONNX sentence encoder
  # resident and (1) embeds the reader's per-drug semantic-search query on request
  # (POST /api/sem/embed) so the browser downloads no model, and (2) (re-)embeds each
  # CRAWLED page's sections in the background, writing the served <slug>.vec.json
  # sidecars (never the frozen 2022 baseline). Caddy reverse-proxies /api/sem/* to it
  # (see Caddyfile); never exposed to the host (no ports:). Kept separate from `web`
  # (read-only) and given only the narrow writable mounts it needs (dist/rcp,
  # dist/eu). Entirely optional: leave it out (docker compose ... up web refresh) and
  # the search box degrades to "indisponible", the site staying 100% static.
  embed:
    build:
      context: ..
      dockerfile: docker/embed.Dockerfile
      args:
        # Same build-time git stamp as refresh (see refresh.Dockerfile's git.sha
        # LABEL). deploy.sh exports GIT_SHA; a plain local build falls back to
        # "unknown". Build-time only, so it stays out of env_file / env.example.
        GIT_SHA: ${GIT_SHA:-unknown}
    container_name: justelesrcp-embed
    restart: unless-stopped
    # Match the host user that owns ../dist so the .vec.json files the service writes
    # stay owned by you and sync cleanly (same rationale as refresh). Defaults to
    # 1000:1000; override with EMBED_UID/EMBED_GID in docker/.env if your host uid
    # differs (e.g. VPS).
    user: "${EMBED_UID:-1000}:${EMBED_GID:-1000}"
    # Same env file as the others. Tuning knobs (all optional, sane defaults in the
    # script): EMBED_ENABLE (background reconcile sweep on/off), EMBED_INTRA_THREADS,
    # EMBED_BACKLOG_RATE_SECONDS, EMBED_RECONCILE_SECONDS, EMBED_QUEUE_MAX,
    # EMBED_MIN_QUERY_CHARS (5) / EMBED_MAX_QUERY_CHARS (400), EMBED_QUERY_CACHE,
    # EMBED_MODEL_DIR, REFRESH_TRIGGER_URL (embed -> refresh, for baseline
    # auto-crawl), EMBED_LOG_LEVEL. See docker/env.example.
    env_file:
      - .env
    volumes:
      # Read-only: the warm encoder model + tokenizer (download-model.sh fetches it
      # into ./models). Mounted, not baked, so it stays out of the image / build
      # context; EMBED_MODEL_DIR defaults to /app/models/Xenova/multilingual-e5-small.
      - ../models:/app/models:ro
      # Read-only: the crawled overlays are the ONLY text this service embeds (never
      # the 2022 baseline CSV, which is not mounted here at all). It reads the raw
      # HTML to segment + embed each page's sections.
      - ../data/rcp:/app/data/rcp:ro
      - ../data/eu:/app/data/eu:ro
      # The ONLY writable locations: the two dist page dirs, where it writes each
      # page's <slug>.vec.json (+ .gz/.br) next to the .html and reads the .html
      # filenames to resolve slugs (build.page_cis_from_dist / _dist_page). No
      # manifest mount: staleness is content-hash baked into each .vec.json.
      - ../dist/rcp:/app/dist/rcp
      - ../dist/eu:/app/dist/eu
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8461/api/sem/health').status==200 else 1)"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
