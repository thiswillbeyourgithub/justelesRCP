# Hardened, read-only static hosting for justelesRCP.
# The generated site (../dist), the Caddyfile and the entrypoint are mounted
# read-only; the container itself runs read-only with tmpfs scratch space.
#
# Runtime config (privacy-friendly umami metrics + the optional DEV banner) comes
# from docker/.env; see docker/env.example for the keys. The entrypoint renders
# it into /gen/app-config.js at startup and Caddy serves that for /app-config.js.
services:
  web:
    image: caddy:2-alpine
    # Stable name so deploy.sh can `docker inspect justelesrcp` for health checks
    # (without it the container would be the project-derived `docker-web-1`).
    container_name: justelesrcp
    restart: unless-stopped
    # Startup wrapper (docker/entrypoint.sh): stamps STARTED_AT, validates
    # ANALYTICS_URL (crashes if set but unreachable / not JavaScript), derives
    # ANALYTICS_ORIGIN for the CSP, renders /gen/app-config.js from the env, then
    # exec's caddy. Run via /bin/sh so no host +x bit is required.
    entrypoint: ["/bin/sh", "/usr/local/bin/entrypoint.sh"]
    ports:
      # host:container - front this with your existing TLS reverse proxy, which
      # is already pointed at 8459.
      - "${PORT:-8459}:8459"
    # Analytics + dev-banner config, injected straight into the container from
    # docker/.env (gitignored; copy docker/env.example). Unset keys fall back to
    # safe defaults in the entrypoint / client code (DNT=true, DEV off, no
    # analytics). We deliberately do NOT add an `environment:` block: it would
    # take precedence over env_file and, since compose interpolates ${VAR} from
    # the CWD rather than docker/, shadow these with empty values.
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
      - ../dist:/srv:ro
    read_only: true
    tmpfs:
      # Caddy needs a writable data/config dir even without TLS; /gen holds the
      # per-startup rendered app-config.js (see entrypoint.sh + Caddyfile).
      - /tmp
      - /config
      - /data
      - /gen
    cap_drop:
      - ALL
    cap_add:
      # The caddy:2-alpine binary ships with `setcap cap_net_bind_service=+ep`.
      # The effective (+e) bit means execve() fails with EPERM ("Operation not
      # permitted") if this cap is not in the bounding set - which cap_drop: ALL
      # empties. We don't bind a privileged port (we listen on 8459), but the
      # binary's file cap must still be satisfiable at exec time, so add it back.
      # Everything else stays dropped; this is the one cap Caddy's binary needs.
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8459/index.html"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Companion refresh service (refresh-service.py): the ONE runtime piece, behind
  # the "Rafraichir maintenant" button and the >1-year auto-refresh. Caddy above
  # reverse-proxies /api/* to it (see Caddyfile), so it is never exposed to the
  # host directly (no ports:). Kept separate from `web` so the web server stays
  # fully read-only; this container gets only the narrow writable mounts it needs.
  refresh:
    build:
      context: ..
      dockerfile: docker/refresh.Dockerfile
    container_name: justelesrcp-refresh
    restart: unless-stopped
    # Match the host user that owns ../data and ../dist so files the service
    # writes (overlays, rebuilt pages, the manifest) stay owned by you and sync
    # cleanly. Defaults to 1000:1000 (the usual first Linux user); override with
    # REFRESH_UID/REFRESH_GID in docker/.env if your host uid differs (e.g. VPS).
    user: "${REFRESH_UID:-1000}:${REFRESH_GID:-1000}"
    # Same env file as web. Tuning knobs (all optional, sane defaults in the
    # script): REFRESH_RATE_SECONDS, REFRESH_MIN_INTERVAL_SECONDS,
    # REFRESH_QUEUE_MAX, RCP_OVERLAY_GZIP. See docker/env.example.
    env_file:
      - .env
    volumes:
      # Read-only: the CIS -> name map (for page titles) and the RCP template are
      # baked into the image, but names must be current, so mount the map RO.
      - ../data/CIS_bdpm.txt:/app/data/CIS_bdpm.txt:ro
      # The ONLY writable locations (the "write just here" compromise): the
      # overlay dir, the rebuilt-page dir, and the scrape manifest file. The
      # manifest must exist on the host first (run scrape-rcp.py once, or
      # `touch data/.scrape-manifest.json`), else Docker would create a directory
      # in its place (IsADirectoryError at startup). deploy.sh heals this before
      # `up`; scrape.load_manifest also tolerates a directory/empty file, and
      # scrape.save_manifest writes in place here (a .tmp sibling would be EROFS
      # since /app/data is read-only apart from this single mounted file).
      - ../data/rcp:/app/data/rcp
      - ../data/.scrape-manifest.json:/app/data/.scrape-manifest.json
      - ../dist/rcp:/app/dist/rcp
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8460/api/health').status==200 else 1)"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
